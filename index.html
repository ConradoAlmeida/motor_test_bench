<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Test Bench - Dashboard Pro</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/css/bootstrap-icons.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link href="style.css" rel="stylesheet">
</head>
<body class="container-fluid p-0">

<div class="row g-0">
    <!-- Sidebar -->
    <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
        <div class="d-flex flex-column h-100">
            <h5 class="mb-4 text-uppercase fw-bold text-info"><i class="bi bi-cpu"></i> ESP32-S3</h5>
            
            <!-- Industrial Status Lights Panel -->
            <div class="led-panel mb-4">
                <div class="text-secondary small fw-bold mb-2 text-uppercase status-label-size">Status Máquina</div>
                <div class="led-container"><span id="led-running" class="led"></span> Running</div>
                <div class="led-container"><span id="led-standby" class="led"></span> Standby</div>
                <div class="led-container"><span id="led-error" class="led"></span> Error/Fault</div>
            </div>

            <hr>

            <!-- SD Card Monitor -->
            <div class="control-group">
                <label class="form-label small text-secondary fw-bold uppercase">SD CARD STATUS</label>
                <div class="sd-card-string small text-light mb-1">Status: <span id="sd-status" class="text-danger">OFFLINE</span></div>
                <div class="progress mt-2 progress-height">
                    <div id="sd-progress" class="progress-bar bg-info" role="progressbar" aria-label="Uso do SD Card"></div>
                </div>
                <div class="text-end text-secondary small" id="sd-usage">0% Used</div>
            </div>

            <hr>

            <!-- Speed Presets -->
            <div class="control-group">
                <label class="form-label small text-secondary fw-bold uppercase" for="ctrl-preset-speed">VELOCIDADE (RPM)</label>
                <select class="form-select bg-dark text-white border-secondary" id="ctrl-preset-speed" title="Selecione a velocidade预设">
                    <option value="0">OFF (0 RPM)</option>
                    <option value="500">Preset: 500 RPM</option>
                    <option value="800">Preset: 800 RPM</option>
                    <option value="1000">Preset: 1000 RPM</option>
                    <option value="1200">Preset: 1200 RPM</option>
                    <option value="1500">Preset: 1500 RPM</option>
                </select>
            </div>

            <!-- Power & Logic Switches -->
            <div class="control-group">
                <label class="form-label small text-secondary fw-bold uppercase">CHAVES DE POTÊNCIA / LOGIC</label>
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="sw-esc-log1">
                    <label class="form-check-label small text-light" for="sw-esc-log1">ESC_LOG 1</label>
                </div>
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="sw-esc-log2">
                    <label class="form-check-label small text-light" for="sw-esc-log2">ESC_LOG 2</label>
                </div>
                <div class="mt-3 mb-1 text-secondary small fw-bold uppercase text-uppercase">Power Bus</div>
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="sw-esc-pwr1">
                    <label class="form-check-label small text-light" for="sw-esc-pwr1">ESC_PWR 1</label>
                </div>
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="sw-esc-pwr2">
                    <label class="form-check-label small text-light" for="sw-esc-pwr2">ESC_PWR 2</label>
                </div>
            </div>

            <hr>

            <!-- Manual PWM Control -->
            <div class="control-group mb-4">
                <label for="ctrl-pwm" class="form-label small text-secondary fw-bold uppercase">PWM MANUAL</label>
                <input type="range" class="form-range" id="ctrl-pwm" min="0" max="255" value="0" title="Controle PWM manual 0-255">
                <div class="text-center fw-bold text-info" id="val-pwm-display">0</div>
            </div>

            <!-- Main Engine Buttons -->
            <div class="d-grid gap-2 mt-auto">
                <button id="btn-start" class="btn btn-success py-2"><i class="bi bi-play-fill"></i> START</button>
                <button id="btn-stop" class="btn btn-warning text-dark py-2"><i class="bi bi-pause-fill"></i> STOP</button>
                <button id="btn-emergency" class="btn btn-danger mt-3 fw-bold py-3 shadow-sm">EMERGENCY!</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
        
        <!-- Top Bar Status -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 text-dark fw-bold m-0">Engine Test Bench <span class="text-muted fs-6 fw-normal">| CAN-BUS Interface</span></h2>
            <div class="d-flex align-items-center bg-white p-2 rounded shadow-sm px-3 border">
                <span id="status-dot" class="status-indicator sidebar-toggle"></span>
                <span id="connection-status" class="text-muted small fw-bold text-uppercase">Desconectado</span>
            </div>
        </div>

        <!-- KPIs -->
        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <div class="card card-metric shadow-sm p-3">
                    <span class="text-secondary small fw-bold text-uppercase">RPM</span>
                    <span class="h2 mb-0 fw-bold" id="val-rpm">0</span>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card card-metric shadow-sm p-3 border-success">
                    <span class="text-secondary small fw-bold text-uppercase">Força (N)</span>
                    <span class="h2 mb-0 fw-bold text-success" id="val-force">0.00</span>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card card-metric shadow-sm p-3 border-warning">
                    <span class="text-secondary small fw-bold text-uppercase">Corrente (A)</span>
                    <span class="h2 mb-0 fw-bold text-warning" id="val-current">0.00</span>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card card-metric shadow-sm p-3 border-info">
                    <span class="text-secondary small fw-bold text-uppercase">Tensão (V)</span>
                    <span class="h2 mb-0 fw-bold text-info" id="val-voltage">0.00</span>
                </div>
            </div>
        </div>

        <!-- Graphs & Logs -->
        <div class="row">
            <div class="col-lg-8 mb-4">
                <div class="card shadow-sm border-0 p-3 graph-container">
                    <h6 class="text-secondary fw-bold mb-3 text-uppercase small"><i class="bi bi-graph-up"></i> Real-time Telemetry</h6>
                    <div class="flex-grow-1">
                        <canvas id="telemetryChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 mb-4">
                <div class="card shadow-sm border-0 p-3 h-100">
                    <h6 class="text-secondary fw-bold mb-3 text-uppercase small"><i class="bi bi-terminal"></i> CAN-BUS Monitor</h6>
                    <div id="can-log" class="can-log-container">
                        <div class="text-muted italic">Aguardando conexão...</div>
                    </div>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- JS Dependencies -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="app.js"></script>
</body>
</html>
